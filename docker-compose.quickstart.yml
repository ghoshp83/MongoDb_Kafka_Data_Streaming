services:
  mongo:
    image: mongo:6
    container_name: mkds-mongo
    command: ["--replSet", "rs0", "--bind_ip_all", "--quiet"]
    ports: ["27017:27017"]
    healthcheck:
      test: |
        mongosh --quiet --eval "try { rs.status().ok } catch (e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}).ok }"
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 3s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: mkds-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: mkds-kafka
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  streamer:
    build: .
    image: mkds-streamer:demo
    container_name: mkds-streamer
    depends_on:
      mongo: {condition: service_healthy}
      kafka: {condition: service_started}
    environment:
      MONGODB_URI: "mongodb://mongo:27017/?replicaSet=rs0"
      MONGODB_DATABASE: demo
      MONGODB_COLLECTION: orders
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: orders-cdc
      # Insert documents with mongosh after the streamer starts -- that way they
      # flow through as change events and the resume-token recovery demo is clean.
      INITIAL_LOAD_ENABLED: "false"
      RESUME_TOKEN_STORAGE: "local"
      RESUME_TOKEN_PATH: "/app/state/resume.token"
      HEALTH_PORT: "8080"
      # Demo-friendly: flush every message so you can see events land in Kafka
      # in real time. Production deployments should raise this.
      KAFKA_BATCH_SIZE: "1"
    ports: ["8080:8080"]
    volumes:
      - streamer-state:/app/state

volumes:
  streamer-state:
